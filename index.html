<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Budget Planner</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── SPLASH ── -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-logo">budget<span>.</span>io</div>
      <div class="splash-sub">Your money, your rules</div>
    </div>
  </div>

  <!-- ── HEADER ── -->
  <header id="appHeader">
    <div class="header-left">
      <div class="logo">budget<span>.</span>io</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
      <button class="icon-btn" onclick="exportCSV()" title="Export CSV" aria-label="Export CSV">⬇</button>
    </div>
  </header>

  <!-- ── MONTH SELECTOR ── -->
  <div class="month-bar">
    <button class="month-nav" onclick="shiftMonth(-1)" aria-label="Previous month">‹</button>
    <div class="month-display">
      <span id="monthName"></span>
      <span id="monthYear" class="month-year"></span>
    </div>
    <button class="month-nav" onclick="shiftMonth(1)" aria-label="Next month">›</button>
  </div>

  <!-- ── PAGES ── -->
  <div id="app">

    <!-- PAGE: DASHBOARD -->
    <section class="page active" id="page-dashboard">

      <!-- Summary Cards -->
      <div class="summary-grid">
        <div class="stat-card income anim-in" style="--delay:.05s">
          <div class="stat-top">
            <span class="stat-label">Income</span>
            <span class="stat-icon">↑</span>
          </div>
          <div class="stat-value" id="totalIncome">₹0</div>
          <div class="stat-count" id="incomeCount">0 entries</div>
        </div>
        <div class="stat-card expense anim-in" style="--delay:.1s">
          <div class="stat-top">
            <span class="stat-label">Expenses</span>
            <span class="stat-icon">↓</span>
          </div>
          <div class="stat-value" id="totalExpense">₹0</div>
          <div class="stat-count" id="expenseCount">0 entries</div>
        </div>
        <div class="stat-card balance anim-in" style="--delay:.15s">
          <div class="stat-top">
            <span class="stat-label">Balance</span>
            <span class="stat-icon">◈</span>
          </div>
          <div class="stat-value" id="totalBalance">₹0</div>
          <div class="stat-count" id="savingsRate">0% saved</div>
        </div>
      </div>

      <!-- Insights Banner -->
      <div id="insightsBanner" class="insights-banner hidden">
        <div class="insight-scroll" id="insightScroll"></div>
      </div>

      <!-- Chart -->
      <div class="card anim-in" style="--delay:.2s">
        <div class="card-header">
          <span class="card-title">Spending Split</span>
          <div class="chart-type-toggle">
            <button class="ctt-btn active" onclick="setChartType('doughnut',this)">Donut</button>
            <button class="ctt-btn" onclick="setChartType('bar',this)">Bar</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="mainChart"></canvas>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </div>

      <!-- Category Breakdown -->
      <div class="card anim-in" style="--delay:.25s">
        <div class="card-header">
          <span class="card-title">By Category</span>
          <span class="card-subtitle" id="catSubtitle">expenses</span>
        </div>
        <div id="catBars"></div>
      </div>

      <!-- Recent Transactions -->
      <div class="card anim-in" style="--delay:.3s">
        <div class="card-header">
          <span class="card-title">Recent</span>
          <button class="text-btn" onclick="switchPage('transactions')">See all →</button>
        </div>
        <div class="tx-list" id="recentList"></div>
      </div>

    </section>

    <!-- PAGE: ADD -->
    <section class="page" id="page-add">
      <div class="add-page-inner">

        <div class="type-toggle-big">
          <button class="ttb income active" id="bigBtnIncome" onclick="setType('income')">
            <span class="ttb-icon">↑</span>
            <span class="ttb-label">Income</span>
          </button>
          <button class="ttb expense" id="bigBtnExpense" onclick="setType('expense')">
            <span class="ttb-icon">↓</span>
            <span class="ttb-label">Expense</span>
          </button>
        </div>

        <div class="amount-hero">
          <span class="amount-currency">₹</span>
          <input type="number" id="heroAmount" class="amount-input" placeholder="0.00"
                 min="0" step="0.01" inputmode="decimal" />
        </div>

        <div class="form-card">
          <div class="form-row">
            <label>Description</label>
            <input type="text" id="desc" class="form-input" placeholder="What was this for?" maxlength="50" />
          </div>
          <div class="form-row">
            <label>Category</label>
            <div class="cat-chips" id="catChips"></div>
          </div>
          <div class="form-row two-col">
            <div>
              <label>Date</label>
              <input type="date" id="txDate" class="form-input" />
            </div>
            <div>
              <label>Recurring</label>
              <div class="toggle-row">
                <label class="switch">
                  <input type="checkbox" id="isRecurring" />
                  <span class="slider"></span>
                </label>
                <span class="toggle-label" id="recurLabel">Off</span>
              </div>
            </div>
          </div>
          <div class="form-row" id="recurFreqRow" style="display:none">
            <label>Frequency</label>
            <select id="recurFreq" class="form-input">
              <option value="weekly">Weekly</option>
              <option value="monthly" selected>Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <div class="form-row">
            <label>Note <span class="optional">(optional)</span></label>
            <input type="text" id="txNote" class="form-input" placeholder="Any extra details..." maxlength="80" />
          </div>
        </div>

        <button class="btn-add" id="submitBtn" onclick="addTransaction()">
          <span id="submitLabel">Add Income</span>
        </button>

      </div>
    </section>

    <!-- PAGE: TRANSACTIONS -->
    <section class="page" id="page-transactions">
      <div class="search-bar-wrap">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search transactions..."
                 oninput="renderTransactions()" />
        </div>
        <select id="filterType" class="filter-select" onchange="renderTransactions()">
          <option value="all">All</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div class="filter-chips-row">
        <button class="fchip active" data-cat="all" onclick="filterByCat(this,'all')">All</button>
        <button class="fchip" data-cat="Food" onclick="filterByCat(this,'Food')">🍜 Food</button>
        <button class="fchip" data-cat="Transport" onclick="filterByCat(this,'Transport')">🚌 Transport</button>
        <button class="fchip" data-cat="Shopping" onclick="filterByCat(this,'Shopping')">🛍️ Shop</button>
        <button class="fchip" data-cat="Education" onclick="filterByCat(this,'Education')">📚 Edu</button>
        <button class="fchip" data-cat="Entertainment" onclick="filterByCat(this,'Entertainment')">🎮 Fun</button>
        <button class="fchip" data-cat="Health" onclick="filterByCat(this,'Health')">🏥 Health</button>
      </div>
      <div id="txGroupedList"></div>
    </section>

    <!-- PAGE: GOALS -->
    <section class="page" id="page-goals">
      <div class="goals-header">
        <p class="goals-intro">Set monthly spending limits per category. We'll track your progress.</p>
      </div>
      <div id="goalsList"></div>
      <button class="btn-add outline" onclick="openGoalModal()">＋ Set Budget Goal</button>
    </section>

    <!-- PAGE: STATS -->
    <section class="page" id="page-stats">
      <div class="card">
        <div class="card-title">Monthly Trend</div>
        <div class="chart-wrap tall">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Top Spending Days</div>
        <div id="topDays"></div>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
    </section>

  </div><!-- /app -->

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item active" onclick="switchPage('dashboard')" data-page="dashboard">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="switchPage('add')" data-page="add" id="addNavBtn">
      <span class="nav-icon add-icon">＋</span>
      <span class="nav-label">Add</span>
    </button>
    <button class="nav-item" onclick="switchPage('transactions')" data-page="transactions">
      <span class="nav-icon">≡</span>
      <span class="nav-label">Txns</span>
    </button>
    <button class="nav-item" onclick="switchPage('goals')" data-page="goals">
      <span class="nav-icon">◎</span>
      <span class="nav-label">Goals</span>
    </button>
    <button class="nav-item" onclick="switchPage('stats')" data-page="stats">
      <span class="nav-icon">↗</span>
      <span class="nav-label">Stats</span>
    </button>
  </nav>

  <!-- ── GOAL MODAL ── -->
  <div class="modal-overlay" id="goalModal" onclick="closeGoalModal(event)">
    <div class="modal-card">
      <div class="modal-title">Set Budget Goal</div>
      <div class="form-row">
        <label>Category</label>
        <select id="goalCat" class="form-input">
          <option value="Food">🍜 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Education">📚 Education</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Utilities">💡 Utilities</option>
          <option value="Health">🏥 Health</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Rent">🏠 Rent</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-row">
        <label>Monthly Limit (₹)</label>
        <input type="number" id="goalAmount" class="form-input" placeholder="e.g. 5000" min="1" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeGoalModal()">Cancel</button>
        <button class="btn-add small" onclick="saveGoal()">Save Goal</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
